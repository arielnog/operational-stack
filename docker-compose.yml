version: "3.9"

# =============================================================
#  VPS STACK — Infraestrutura base
#  Arquitetura: docs/ARCHITECTURE.md
#
#  Serviços: Traefik · Metabase (banco próprio) · Grafana
#            Loki · Promtail · Redis
#
#  Sem Postgres global — cada app sobe seu próprio banco
# =============================================================

networks:
  # Roteamento externo — Traefik + serviços com rota pública
  traefik_public:
    external: true

  # Comunicação interna — Redis, Loki, Promtail, Grafana, apps
  infra_internal:
    external: true

  # Metabase conecta aos bancos das apps (read-only)
  # Apps conectam o Postgres delas a esta rede
  infra_data: 
    external: true

volumes:
  metabase_db_data:
  metabase_data:
  grafana_data:
  loki_data:
  traefik_certs:
  redis_data:

# =============================================================
services:

  # -----------------------------------------------------------
  # TRAEFIK — Proxy reverso + SSL automático via Let's Encrypt
  # -----------------------------------------------------------
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik_public
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - TRAEFIK_CERTIFICATESRESOLVERS_CLOUDFLARE_ACME_EMAIL=${LETSENCRYPT_EMAIL}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic.yml:/dynamic.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=auth@docker"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -----------------------------------------------------------
  # POSTGRES — Banco exclusivo do Metabase
  # -----------------------------------------------------------
  metabase-db:
    image: postgres:16-alpine
    container_name: metabase-db
    restart: unless-stopped
    networks:
      - infra_internal
    environment:
      POSTGRES_DB: ${METABASE_DB}
      POSTGRES_USER: ${METABASE_DB_USER}
      POSTGRES_PASSWORD: ${METABASE_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - metabase_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METABASE_DB_USER} -d ${METABASE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 128mb

  # -----------------------------------------------------------
  # METABASE — BI (leitura dos bancos das apps via infra_data)
  # -----------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    networks:
      - traefik_public
      - infra_internal
      - infra_data
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB:-metabase}
      MB_DB_PORT: 5432
      MB_DB_USER: ${METABASE_DB_USER:-metabase_user}
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: metabase-db
      MB_SITE_URL: https://metabase.${DOMAIN}
      JAVA_TIMEZONE: America/Sao_Paulo
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      metabase-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.metabase.rule=Host(`metabase.${DOMAIN}`)"
      - "traefik.http.routers.metabase.entrypoints=websecure"
      - "traefik.http.routers.metabase.tls.certresolver=cloudflare"
      - "traefik.http.services.metabase.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -----------------------------------------------------------
  # GRAFANA — Logs e métricas (usa SQLite interno)
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - traefik_public
      - infra_internal
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      GF_SERVER_DOMAIN: grafana.${DOMAIN}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_LOG_MODE: console
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -----------------------------------------------------------
  # REDIS — Cache/filas compartilhado (ver redis/databases.md)
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - infra_internal
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------------------
  # LOKI — Agregação de logs
  # -----------------------------------------------------------
  loki:
    image: grafana/loki:3.6   # ✅ evite :latest em prod
    container_name: loki
    restart: unless-stopped
    networks:
      - infra_internal
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - loki_data:/loki
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s      # ✅ mais frequente para o depends_on funcionar rápido
      timeout: 5s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # PROMTAIL — Coleta e envia logs para o Loki
  # -----------------------------------------------------------
  promtail:
    image: grafana/promtail:3.6   # ✅ mesma versão do Loki
    container_name: promtail
    restart: unless-stopped
    networks:
      - infra_internal
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # ✅ read-only é suficiente
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      loki:
        condition: service_healthy
