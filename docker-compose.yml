version: "3.9"

# =============================================================
#  VPS STACK — Infraestrutura base
#  Serviços: Traefik · PostgreSQL · Redis · Metabase · Grafana
#            Loki · Promtail
# =============================================================

networks:
  # Rede pública — só Traefik fica aqui
  proxy:
    external: true

  # Rede interna — todos os serviços se comunicam aqui
  internal:
    internal: true

  # Rede de observabilidade — Grafana, Loki, Promtail
  observability:
    internal: true

volumes:
  postgres_data:
  redis_data:
  metabase_data:
  grafana_data:
  loki_data:
  traefik_certs:

# =============================================================
services:

  # -----------------------------------------------------------
  # TRAEFIK — Proxy reverso + SSL automático via Let's Encrypt
  # -----------------------------------------------------------
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - internal
    ports:
      - "80:80"      # HTTP  (redireciona para HTTPS)
      - "443:443"    # HTTPS
      # Porta 8080 (dashboard) NÃO exposta externamente — acesso via túnel ou VPN
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}   # Cloudflare API token para DNS challenge
      - DOCKER_API_VERSION=1.45                # Forçar versão compatível da API Docker
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic.yml:/dynamic.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=auth@file"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -----------------------------------------------------------
  # POSTGRESQL — Banco de dados principal (multi-schema)
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - internal
    # PORTA NÃO EXPOSTA — acesso apenas pela rede interna Docker
    # Para acesso local use: docker exec -it postgres psql -U $POSTGRES_USER
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Variáveis usadas pelo script 02_create_services.sh
      METABASE_DB: ${METABASE_DB}
      METABASE_DB_USER: ${METABASE_DB_USER}
      METABASE_DB_PASSWORD: ${METABASE_DB_PASSWORD}
      GRAFANA_DB: ${GRAFANA_DB}
      GRAFANA_DB_USER: ${GRAFANA_DB_USER}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro   # Scripts executados na criação
      - ./scripts:/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 256mb

  # -----------------------------------------------------------
  # REDIS — Cache e filas
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - internal
    # PORTA NÃO EXPOSTA externamente
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -----------------------------------------------------------
  # METABASE — Business Intelligence / dashboards
  # -----------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    networks:
      - proxy
      - internal
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${METABASE_DB_USER}
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: postgres
      MB_SITE_URL: https://metabase.${DOMAIN}
      JAVA_TIMEZONE: America/Sao_Paulo
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.metabase.rule=Host(`metabase.${DOMAIN}`)"
      - "traefik.http.routers.metabase.entrypoints=websecure"
      - "traefik.http.routers.metabase.tls.certresolver=cloudflare"
      - "traefik.http.services.metabase.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -----------------------------------------------------------
  # GRAFANA — Métricas e observabilidade
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - proxy
      - internal
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      GF_SERVER_DOMAIN: grafana.${DOMAIN}
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: ${GRAFANA_DB}
      GF_DATABASE_USER: ${GRAFANA_DB_USER}
      GF_DATABASE_PASSWORD: ${GRAFANA_DB_PASSWORD}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_LOG_MODE: console
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=cloudflare"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -----------------------------------------------------------
  # LOKI — Agregação de logs
  # -----------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    networks:
      - observability
      - internal
    # PORTA NÃO EXPOSTA — acesso apenas interno (Grafana + Promtail)
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - loki_data:/loki
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -----------------------------------------------------------
  # PROMTAIL — Coleta e envia logs para o Loki
  # -----------------------------------------------------------
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    networks:
      - observability
      - internal
    volumes:
      - /var/log:/var/log:ro                          # Logs do host
      - /var/lib/docker/containers:/var/lib/docker/containers:ro  # Logs dos containers
      - /var/run/docker.sock:/var/run/docker.sock     # Socket Docker para autodiscovery
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
    depends_on:
      - loki
