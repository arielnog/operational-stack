# promtail.yml
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Logs de todos os containers Docker (sem docker_sd, usando file_sd estável) ──
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

  # ── Logs do sistema (host) ──────────────────────────────────────────
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: vps
          __path__: /var/log/syslog

  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          host: vps
          __path__: /var/log/auth.log

  # ── Logs do Traefik ─────────────────────────────────────────────────
  - job_name: traefik
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik
          host: vps
          __path__: /var/log/traefik/*.log
    pipeline_stages:
      - json:
          expressions:
            status: ResponseCode
            method: RequestMethod
            path: RequestPath
            duration: Duration
            client_host: ClientHost
      - labels:
          status:
          method: