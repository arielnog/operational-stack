# promtail.yml

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Logs de todos os containers Docker (autodiscovery) ──────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Usar nome do container como label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Usar imagem como label
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
      # Usar compose service como label (se existir)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Usar compose project como label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      # Descartar containers sem nome
      - source_labels: ['container']
        regex: '.+'
        action: keep
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - labels:
          stream:
      - output:
          source: output

  # ── Logs do sistema (host) ───────────────────────────────────────────────
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: vps
          __path__: /var/log/syslog

  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          host: vps
          __path__: /var/log/auth.log

  # ── Logs do Nginx/Traefik (se quiser parsear access logs) ─────────────
  - job_name: traefik
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik
          host: vps
          __path__: /var/log/traefik/*.log
    pipeline_stages:
      - json:
          expressions:
            status: ResponseCode
            method: RequestMethod
            path: RequestPath
            duration: Duration
            client_host: ClientHost
      - labels:
          status:
          method:
